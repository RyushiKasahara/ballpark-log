<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BALLPARK LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --navy:#1B2A4A;--navy-dark:#0F1B31;--navy-light:#253A60;
  --ivory:#FBF8F0;--ivory-dark:#EDE8DC;
  --gold:#D4A843;--crimson:#C0392B;--green:#2C5F2E;
  --text:#1a1a1a;--text-muted:#6b6b6b;--border:#E0DDD4;--white:#ffffff;
  --bg:#FBF8F0;--card-bg:#ffffff;--card-border:#E0DDD4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-attachment:fixed;background-size:cover;background-position:center;transition:background 0.3s;}
body.bg-overlay::before{content:'';position:fixed;inset:0;background:var(--bg-overlay,rgba(251,248,240,0.88));z-index:0;pointer-events:none;}
#root{position:relative;z-index:1;}

/* ---- HEADER ---- */
.header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.18);}
.header-inner{max-width:960px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:10px;}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo-ball{width:30px;height:30px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:var(--gold);}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:-2px;}
.header-nav{display:flex;gap:3px;flex:1;justify-content:flex-end;}
.nav-tab{padding:7px 12px;border:none;background:transparent;color:rgba(255,255,255,0.55);font-size:12px;cursor:pointer;border-radius:6px;font-family:'Noto Sans JP',sans-serif;transition:all 0.18s;white-space:nowrap;min-height:36px;}
.nav-tab.active{background:var(--gold);color:var(--navy);font-weight:700;}
.nav-tab:hover:not(.active){color:white;background:rgba(255,255,255,0.1);}
.nav-ext{padding:7px 11px;background:transparent;color:rgba(255,255,255,0.45);font-size:12px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;border:1px solid rgba(255,255,255,0.15);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all 0.18s;white-space:nowrap;min-height:36px;}
.nav-ext:hover{color:white;border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.06);}
.icon-btn{background:transparent;border:none;color:rgba(255,255,255,0.45);cursor:pointer;font-size:18px;padding:6px;border-radius:6px;transition:color 0.15s;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:hover{color:var(--gold);}

/* ---- BOTTOM NAV (mobile) ---- */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--navy);border-top:1px solid rgba(255,255,255,0.08);padding-bottom:env(safe-area-inset-bottom,0);}
.bottom-nav-inner{display:flex;justify-content:space-around;padding:6px 0;}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:color 0.18s;min-height:52px;border-radius:8px;}
.bnav-tab .bnav-icon{font-size:20px;line-height:1;}
.bnav-tab.active{color:var(--gold);}
.bnav-tab.bnav-add{color:white;}
.bnav-tab.bnav-add .bnav-icon-circle{width:38px;height:38px;background:var(--crimson);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 3px 12px rgba(192,57,43,0.45);}

/* ---- MAIN ---- */
.main{max-width:960px;margin:0 auto;padding:18px 16px 90px;}

/* ---- SEARCH BAR ---- */
.search-wrap{position:relative;margin-bottom:14px;}
.search-input{width:100%;padding:11px 14px 11px 42px;border:1px solid var(--card-border);border-radius:12px;background:var(--card-bg);color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color 0.18s,box-shadow 0.18s;}
.search-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,0.1);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.search-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;line-height:1;border-radius:4px;}
.search-meta{font-size:12px;color:var(--text-muted);margin-bottom:10px;padding-left:2px;}
.search-meta strong{color:var(--navy);}
mark{background:#fff5b0;border-radius:2px;padding:0 2px;}

/* ---- GAME CARDS ---- */
.game-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;-webkit-user-select:none;user-select:none;}
@media(hover:hover){.game-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(27,42,74,0.13);}}
.game-card:active{transform:scale(0.985);}
.game-card-header{background:var(--navy);padding:9px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.game-date{color:var(--gold);font-size:12px;font-weight:500;letter-spacing:0.8px;flex-shrink:0;}
.game-stadium-badge{color:rgba(255,255,255,0.55);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.game-card-body{padding:13px 15px 11px;}
.game-matchup{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.team-label{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-label.right{text-align:right;}
.team-label.fav{color:var(--navy);}
.score-display{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--navy);letter-spacing:2px;flex-shrink:0;}
.vs-label{font-size:12px;color:var(--text-muted);flex-shrink:0;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;}
.badge{background:var(--ivory);border:1px solid var(--card-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-muted);}
.badge.win{background:#eaf5eb;border-color:#b5d9b7;color:var(--green);font-weight:700;}
.badge.lose{background:#fdf0ef;border-color:#f5c4be;color:var(--crimson);font-weight:700;}
.badge.draw{background:var(--ivory-dark);color:var(--text-muted);font-weight:700;}
.game-card-footer{padding:8px 15px;border-top:1px solid var(--ivory-dark);}
.memo-preview{font-size:12px;color:var(--text-muted);line-height:1.55;}

/* ---- FAB (desktop only) ---- */
.fab{position:fixed;bottom:26px;right:26px;width:54px;height:54px;background:var(--crimson);color:white;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(192,57,43,0.38);display:flex;align-items:center;justify-content:center;transition:transform 0.18s;z-index:200;}
.fab:hover{transform:scale(1.1);}

/* ---- CARDS ---- */
.card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:18px;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:2px;text-transform:uppercase;padding-bottom:9px;border-bottom:2px solid var(--gold);margin-bottom:13px;}

/* ---- DETAIL ---- */
.detail-hero{background:var(--navy);border-radius:14px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.detail-hero::before{content:'';position:absolute;right:-28px;top:-28px;width:150px;height:150px;border:2px solid rgba(212,168,67,0.12);border-radius:50%;}
.detail-hero::after{content:'';position:absolute;right:18px;top:18px;width:82px;height:82px;border:1.5px solid rgba(212,168,67,0.08);border-radius:50%;}
.detail-meta{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:13px;letter-spacing:0.5px;}
.detail-matchup{display:flex;align-items:center;gap:12px;}
.detail-team{flex:1;overflow:hidden;}
.detail-team-label{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:2px;letter-spacing:1px;text-transform:uppercase;}
.detail-team-name{font-size:16px;font-weight:700;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-team-name.winner{color:var(--gold);}
.detail-score{font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--gold);letter-spacing:4px;line-height:1;text-align:center;flex-shrink:0;}
.detail-seat{font-size:12px;color:rgba(255,255,255,0.45);margin-top:11px;}
.result-banner{display:inline-block;margin-top:13px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;}
.result-banner.win{background:rgba(44,95,46,0.25);color:#7ed67f;}
.result-banner.lose{background:rgba(192,57,43,0.25);color:#f08080;}
.result-banner.draw{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);}

/* ---- FORMS ---- */
.form-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap;}
.form-tab{padding:8px 15px;border-radius:8px;border:1px solid var(--card-border);cursor:pointer;font-family:inherit;font-size:13px;background:var(--ivory);color:var(--text);transition:all 0.15s;min-height:40px;}
.form-tab.active{background:var(--navy);color:white;border-color:var(--navy);font-weight:700;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
input,select,textarea{border:1px solid var(--card-border);border-radius:8px;padding:10px 12px;font-size:16px;font-family:'Noto Sans JP',sans-serif;background:var(--ivory);color:var(--text);outline:none;transition:border-color 0.18s;width:100%;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--navy);background:white;}
.btn-row{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.btn-primary{background:var(--navy);color:white;border:none;border-radius:8px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background 0.18s;min-height:44px;}
.btn-primary:hover{background:var(--navy-dark);}
.btn-secondary{background:transparent;color:var(--navy);border:1px solid var(--card-border);border-radius:8px;padding:12px 22px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.18s;min-height:44px;}
.btn-secondary:hover{background:var(--ivory);border-color:var(--navy);}
.btn-danger{background:transparent;color:var(--crimson);border:1px solid var(--crimson);border-radius:8px;padding:12px 22px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.18s;min-height:44px;}
.btn-danger:hover{background:#fdf0ef;}

/* ---- FOOD ---- */
.food-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--ivory-dark);}
.food-icon{width:40px;height:40px;background:var(--ivory);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.food-name{flex:1;font-weight:500;font-size:14px;}
.food-price{color:var(--text-muted);font-size:13px;font-weight:500;flex-shrink:0;}
.food-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:22px;padding:4px 6px;transition:color 0.15s;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.food-remove:hover{color:var(--crimson);}
.food-total{text-align:right;padding-top:10px;font-weight:700;color:var(--navy);font-size:14px;}
.food-add-row{display:flex;gap:8px;margin-top:12px;}

/* ---- PHOTOS ---- */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-del-btn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.65);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;}
.photo-thumb:hover .photo-del-btn,.photo-thumb.touch-active .photo-del-btn{opacity:1;}
.upload-zone{border:2px dashed var(--card-border);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;background:var(--ivory);transition:border-color 0.18s;margin-top:11px;}
.upload-zone:hover,.upload-zone:active{border-color:var(--navy);background:var(--ivory-dark);}

/* ---- LIGHTBOX ---- */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.lightbox img{max-width:100%;max-height:88vh;border-radius:8px;}
.lightbox-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,0.12);border:none;color:white;font-size:22px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* ---- STATS ---- */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.stat-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:16px 12px;text-align:center;}
.stat-big{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--navy);line-height:1;margin-bottom:4px;}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--ivory-dark);}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.rank-badge.gold{background:var(--gold);color:var(--navy);}
.rank-badge.silver{background:#C0C0C0;color:#444;}
.rank-badge.bronze{background:#CD7F32;color:white;}
.rank-badge.other{background:var(--ivory-dark);color:var(--text-muted);}
.rank-name{flex:1;font-size:13px;font-weight:500;}
.rank-bar-wrap{display:flex;align-items:center;gap:8px;}
.rank-bar-bg{background:var(--ivory);border-radius:4px;height:7px;width:80px;overflow:hidden;flex-shrink:0;}
.rank-bar-fill{background:var(--navy);height:100%;border-radius:4px;transition:width 0.5s;}
.rank-count{font-size:12px;color:var(--text-muted);min-width:36px;text-align:right;}
.wl-row{display:flex;gap:10px;align-items:center;margin-bottom:13px;}
.wl-box{flex:1;border-radius:12px;padding:13px 10px;text-align:center;}
.wl-box.w{background:#eaf5eb;border:1px solid #b5d9b7;}
.wl-box.l{background:#fdf0ef;border:1px solid #f5c4be;}
.wl-box.d{background:var(--ivory-dark);border:1px solid var(--card-border);}
.wl-num{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
.wl-box.w .wl-num{color:var(--green);}
.wl-box.l .wl-num{color:var(--crimson);}
.wl-box.d .wl-num{color:var(--text-muted);}
.wl-lbl{font-size:11px;font-weight:700;letter-spacing:1px;margin-top:2px;}
.wl-box.w .wl-lbl{color:var(--green);}
.wl-box.l .wl-lbl{color:var(--crimson);}
.wl-box.d .wl-lbl{color:var(--text-muted);}

/* ---- WEATHER ---- */
.weather-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.weather-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:14px;}
.weather-stadium{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:9px;}
.weather-days{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.weather-day{flex-shrink:0;text-align:center;background:var(--ivory);border-radius:9px;padding:8px 9px;min-width:54px;}
.weather-day-label{font-size:10px;color:var(--text-muted);margin-bottom:5px;font-weight:700;}
.weather-day-icon{font-size:20px;margin-bottom:3px;line-height:1;}
.weather-day-hi{font-size:12px;font-weight:700;color:var(--crimson);}
.weather-day-lo{font-size:11px;color:#5e9cff;margin-top:1px;}
.weather-day-rain{font-size:10px;color:#5e9cff;margin-top:2px;}

/* ---- SETTINGS MODAL ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.modal{background:var(--white);border-radius:22px 22px 0 0;padding:22px 20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--navy);}
.fav-team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0;}
.fav-team-btn{padding:11px 8px;border:1.5px solid var(--card-border);border-radius:10px;background:var(--ivory);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;color:var(--text);line-height:1.4;min-height:44px;}
.fav-team-btn.selected{border-color:var(--gold);background:#fdf8ec;font-weight:700;color:var(--navy);}

/* ---- BACKGROUND PICKER ---- */
.bg-section{margin-top:20px;padding-top:18px;border-top:1px solid var(--card-border);}
.bg-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.bg-preset{border:2px solid transparent;border-radius:10px;cursor:pointer;overflow:hidden;aspect-ratio:1.6;position:relative;transition:border-color 0.15s;}
.bg-preset.selected{border-color:var(--gold);}
.bg-preset .bg-swatch{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.bg-preset-label{font-size:10px;color:var(--text-muted);text-align:center;margin-top:4px;}
.bg-upload-zone{border:2px dashed var(--card-border);border-radius:10px;padding:18px 10px;text-align:center;cursor:pointer;background:var(--ivory);transition:border-color 0.18s;margin-top:8px;}
.bg-upload-zone:hover{border-color:var(--navy);}
.bg-current-preview{width:100%;height:70px;border-radius:10px;border:1px solid var(--card-border);object-fit:cover;margin-top:8px;}
.overlay-row{display:flex;align-items:center;gap:10px;margin-top:12px;}
.overlay-label{font-size:13px;color:var(--text-muted);flex:1;}
input[type=range]{padding:0;height:4px;border-radius:2px;background:var(--ivory-dark);border:none;}

/* DATA SECTION */
.data-section{margin-top:20px;padding-top:18px;border-top:1px solid var(--card-border);}
.data-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.data-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:12px;border:1.5px solid var(--card-border);background:var(--ivory);cursor:pointer;font-family:inherit;transition:all 0.15s;text-align:center;}
.data-btn:hover{border-color:var(--navy);background:#f0f4fa;}
.data-btn-icon{font-size:24px;line-height:1;}
.data-btn-label{font-size:13px;font-weight:700;color:var(--navy);}
.data-btn-desc{font-size:11px;color:var(--text-muted);line-height:1.4;}
.data-btn.danger{border-color:#f5c4be;}
.data-btn.danger:hover{border-color:var(--crimson);background:#fdf0ef;}
.data-btn.danger .data-btn-label{color:var(--crimson);}
.import-result{margin-top:10px;padding:10px 13px;border-radius:8px;font-size:13px;line-height:1.6;}
.import-result.success{background:#eaf5eb;color:var(--green);border:1px solid #b5d9b7;}
.import-result.error{background:#fdf0ef;color:var(--crimson);border:1px solid #f5c4be;}

/* BACK / EMPTY */
.back-btn{background:none;border:none;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:7px;margin-bottom:14px;font-family:inherit;font-size:14px;font-weight:700;padding:4px 0;min-height:36px;}
.empty-state{text-align:center;padding:52px 20px;}
.empty-icon{font-size:46px;margin-bottom:13px;}
.empty-title{font-size:18px;font-weight:700;margin-bottom:6px;}

function formatDate(s){
  if(!s)return'';
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function getResult(g,myTeam){
  if(!myTeam||g.homeScore===''||g.awayScore==='')return null;
  const h=parseInt(g.homeScore),a=parseInt(g.awayScore);
  if(isNaN(h)||isNaN(a))return null;
  const isHome=g.homeTeam===myTeam;
  const my=isHome?h:a,opp=isHome?a:h;
  if(my>opp)return'WIN';if(my<opp)return'LOSE';return'DRAW';
}

  if(code<=77)return'❄️';if(code<=82)return'🌦️';if(code<=86)return'🌨️';
  return'⛈️';
}

/* ---- highlight matched text ---- */
function Highlight({text,q}){
  if(!q||!text)return React.createElement(React.Fragment,null,text||'');
  const parts=text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
  return React.createElement(React.Fragment,null,...parts.map((p,i)=>
    p.toLowerCase()===q.toLowerCase()
      ? React.createElement('mark',{key:i},p)
      : p
  ));
}

/* ---- search util ---- */
function gameMatchesQuery(g,q){
  if(!q)return true;
  const lq=q.toLowerCase();
  return(
    (g.homeTeam||'').toLowerCase().includes(lq)||
    (g.awayTeam||'').toLowerCase().includes(lq)||
    (g.stadium||'').toLowerCase().includes(lq)||
    (g.memo||'').toLowerCase().includes(lq)||
    (g.seat||'').toLowerCase().includes(lq)||
    (g.date||'').includes(lq)||
    (g.foods||[]).some(f=>(f.name||'').toLowerCase().includes(lq))
  );
}

/* ---- apply background ---- */
function applyBg(pref){
  const body=document.body;
  const preset=BG_PRESETS.find(p=>p.id===pref.id)||BG_PRESETS[0];
  body.classList.remove('bg-overlay');
  body.style.backgroundImage='';
  body.style.background='';
  document.documentElement.style.setProperty('--bg','#FBF8F0');
  document.documentElement.style.setProperty('--card-bg','#ffffff');
  document.documentElement.style.setProperty('--card-border','#E0DDD4');
  document.documentElement.style.setProperty('--text','#1a1a1a');
  document.documentElement.style.setProperty('--text-muted','#6b6b6b');
  if(pref.id==='default'){return;}
  const overlayOpacity=pref.opacity!=null?pref.opacity:preset.overlay;
  if(pref.id==='custom'&&pref.img){
    body.style.backgroundImage=`url(${pref.img})`;
    body.style.backgroundSize='cover';
    body.style.backgroundAttachment='fixed';
    body.style.backgroundPosition='center';
    document.documentElement.style.setProperty('--bg-overlay',`rgba(251,248,240,${overlayOpacity})`);
    body.classList.add('bg-overlay');
  } else if(pref.id!=='custom'){
    const s=preset.style;
    if(s.background) body.style.background=s.background;
    document.documentElement.style.setProperty('--bg-overlay',`rgba(251,248,240,${overlayOpacity})`);
    body.classList.add('bg-overlay');
    if(preset.dark&&overlayOpacity<0.5){

      document.documentElement.style.setProperty('--card-border','rgba(255,255,255,0.1)');

      document.documentElement.style.setProperty('--text-muted','rgba(255,255,255,0.5)');
      document.documentElement.style.setProperty('--bg','#0d1b2a');
    }
  }
}

/* generic proxy fetch */
async function fetchWithProxy(targetUrl,timeout=7000){
  const routes=[
    {label:'直接',  fn:()=>fetch(targetUrl,{mode:'cors'})},
    {label:'proxy①',fn:()=>fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`)},
    {label:'proxy②',fn:()=>fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`)},
    {label:'proxy③',fn:()=>fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`)},
    {label:'proxy④',fn:()=>fetch(`https://thingproxy.freeboard.io/fetch/${targetUrl}`)},
  ];
  const errors=[];
  for(const{label,fn}of routes){
    try{
      const resp=await Promise.race([fn(),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),timeout))]);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const text=await resp.text();
      return{json:JSON.parse(text),via:label};
    }catch(e){errors.push(`${label}: ${e.message}`);}
  }
  throw new Error(errors.join(' / '));
}

async function fetchSpaiaGames(date){
  const d=new Date(date+'T00:00:00');
  const gameDate=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const {json,via}=await fetchWithProxy(`https://spaia.jp/baseball/npb/api/games_info_by_date?gameDate=${gameDate}`);
  return{gameDate,data:json,via};
}

async function fetchSpaiaGameDetail(gameId,matchday,homeTeamId,visitorTeamId,gameKindId){
  const gid=String(gameId);
  const teamIds=JSON.stringify([String(homeTeamId),String(visitorTeamId)]);
  const [overview,members,homers,pitchers,live,batters]=await Promise.allSettled([
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/game_over_view?gameId=${gid}`),
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/starting_members_for_flash?gameId=${gid}`),
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/flash_homerun?gameId=${gid}`),
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/both_pitcher_game_stats?gameId=${gid}&matchday=${matchday}&teamIds=${encodeURIComponent(teamIds)}&gameKindId=${gameKindId||1}`),
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/live_games?GameID=${gid}`),
    fetchWithProxy(`https://spaia.jp/baseball/npb/api/both_batter_stats?gameId=${gid}&matchday=${matchday}&teamIds=${encodeURIComponent(teamIds)}&gameKindId=${gameKindId||1}`),
  ]);
  return{
    overview: overview.status==='fulfilled'?(overview.value.json[0]||null):null,
    members:  members.status==='fulfilled'?members.value.json:[],
    homers:   homers.status==='fulfilled'?homers.value.json:[],
    pitchers: pitchers.status==='fulfilled'?pitchers.value.json:[],
    live:     live.status==='fulfilled'?(live.value.json[0]||null):null,
    batters:  batters.status==='fulfilled'?batters.value.json:[],
  };
}

/* ---- Image compress util ---- */
function compressImage(file,maxW=1200,quality=0.75){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>resolve(e.target.result);
      img.src=e.target.result;
    };
    reader.onerror=()=>resolve(null);
    reader.readAsDataURL(file);
  });
}
async function processFilesSequential(files){
  const results=[];
  for(const file of files){
    const src=await compressImage(file);
    if(src)results.push({id:genId(),src,name:file.name});
  }
  return results;
}

function AddForm({initial,onSave,onCancel}){
  const blank={date:new Date().toISOString().slice(0,10),homeTeam:'',awayTeam:'',stadium:'',homeScore:'',awayScore:'',weather:'',seat:'',memo:''};
  const[form,setForm]=useState(initial?{...initial}:blank);
  const[foods,setFoods]=useState(initial?.foods||[]);
  const[photos,setPhotos]=useState(initial?.photos||[]);
  const[ftab,setFtab]=useState('basic');
  const[foodName,setFoodName]=useState('');
  const[foodPrice,setFoodPrice]=useState('');
  const[fetchState,setFetchState]=useState('idle');
  const[fetchGames,setFetchGames]=useState([]);
  const[fetchError,setFetchError]=useState('');
  const[fetchVia,setFetchVia]=useState('');
  const[selectedGame,setSelectedGame]=useState(null); // the chosen game object
  const[detail,setDetail]=useState(null);   // fetchSpaiaGameDetail result
  const[detailLoading,setDetailLoading]=useState(false);
  const[detailError,setDetailError]=useState('');
  const[photoLoading,setPhotoLoading]=useState(false);
  const[menuCat,setMenuCat]=useState(JINGU_MENU[0].cat);
  const[menuOpen,setMenuOpen]=useState(false);
  const fileRef=useRef();
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const canFetch=form.date;

  const handleFetch=async()=>{
    setFetchState('loading');setFetchGames([]);setFetchError('');setFetchVia('');
    try{
      const{data,via}=await fetchSpaiaGames(form.date);
      const list=Array.isArray(data)?data:(data.games||data.data||data.gameList||data.results||[]);
      if(!list.length){setFetchState('notfound');return;}
      setFetchGames(list);setFetchState('done');setFetchVia(via);
    }catch(e){
      setFetchState('error');
      setFetchError(e.message||'全ルート失敗');
    }
  };

  const applyGame=(g)=>{
    const home=g.homeTeamName||'';
    const away=g.visitorTeamName||'';
    const hs=g.homeTeamTotalRuns!=null?String(g.homeTeamTotalRuns):'';
    const as=g.visitorTeamTotalRuns!=null?String(g.visitorTeamTotalRuns):'';
    setForm(f=>({...f,homeTeam:home||f.homeTeam,awayTeam:away||f.awayTeam,homeScore:hs||f.homeScore,awayScore:as||f.awayScore}));
    setFetchState('applied');
    setSelectedGame(g);
    setDetail(null);
    setDetailError('');
    // auto-fetch detail
    loadDetail(g);
  };

  const loadDetail=async(g)=>{
    setDetailLoading(true);setDetailError('');
    try{
      const d=new Date(form.date+'T00:00:00');
      const matchday=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const kindId=Number(g.gameKindId||g.gameTypeId||g.GameTypeID||1);
      const result=await fetchSpaiaGameDetail(g.gameId||g.GameID,matchday,g.homeTeamId||g.H_Score_ID,g.visitorTeamId||g.V_Score_ID,kindId);
      setDetail(result);
      // 球場を自動反映
      const stadium=result.overview?.stadiumName||result.live?.StadiumName||'';
      if(stadium){
        const stMatch=STADIUMS.find(s=>s.includes(stadium)||stadium.includes(s.slice(0,4)));
        if(stMatch)setForm(f=>({...f,stadium:stMatch}));
      }
    }catch(e){setDetailError('詳細取得失敗: '+e.message);}
    setDetailLoading(false);
  };

  const addFood=()=>{
    if(!foodName.trim())return;
    const icon=FOOD_ICONS[Math.floor(Math.random()*FOOD_ICONS.length)];
    setFoods(fs=>[...fs,{id:genId(),name:foodName.trim(),price:foodPrice,emoji:icon}]);
    setFoodName('');setFoodPrice('');
  };

  // Fixed: sequential processing with canvas compression to prevent freeze
  const handleFiles=async e=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    e.target.value='';
    setPhotoLoading(true);
    const newPhotos=await processFilesSequential(files);
    setPhotos(ps=>[...ps,...newPhotos]);
    setPhotoLoading(false);
  };

  const save=()=>{
    if(!form.homeTeam||!form.awayTeam||!form.stadium||!form.date){alert('日付・球場・ホーム・ビジターチームは必須です');return;}
    onSave({...form,foods,photos,id:form.id||genId(),spaiaDetail:detail||undefined});
  };
  const tabs=[{key:'basic',label:'⚾ 試合情報'},{key:'food',label:'🍱 グルメ'},{key:'photo',label:'📷 写真'}];
  const spaiaDayUrl=form.date?`https://spaia.jp/baseball/npb/schedule?date=${form.date.replace(/-/g,'')}`:'https://spaia.jp/baseball/npb/schedule';

  return(
    <div className="card">
      <div className="form-tabs">
        {tabs.map(t=><button key={t.key} className={`form-tab${ftab===t.key?' active':''}`} onClick={()=>setFtab(t.key)}>{t.label}</button>)}
      </div>
      {ftab==='basic'&&<>
        <div className="section-title">試合情報</div>
        <div className="form-grid">
          <div className="form-group"><label className="form-label">日付 *</label><input type="date" value={form.date} onChange={e=>{set('date',e.target.value);setFetchState('idle');setFetchGames([]);}}/></div>
          <div className="form-group"><label className="form-label">球場 *</label><select value={form.stadium} onChange={e=>set('stadium',e.target.value)}><option value="">選択してください</option>{STADIUMS.map(s=><option key={s}>{s}</option>)}</select></div>
        </div>

        {/* SPAIA FETCH PANEL */}
        {canFetch&&(
          <div style={{background:'linear-gradient(135deg,#1B2A4A,#253A60)',borderRadius:'12px',padding:'14px 16px',marginBottom:'14px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'10px'}}>
              <div>
                <div style={{color:'var(--gold)',fontWeight:700,fontSize:'13px',marginBottom:'3px'}}>⚾ SPAIA から試合結果を取得</div>
                <div style={{color:'rgba(255,255,255,0.5)',fontSize:'11px'}}>当日の全試合一覧を取得してフォームに反映します</div>
              </div>
              {fetchState!=='applied'&&(
                <button onClick={handleFetch} disabled={fetchState==='loading'}
                  style={{background:fetchState==='loading'?'rgba(212,168,67,0.4)':'var(--gold)',color:'var(--navy)',border:'none',borderRadius:'8px',padding:'9px 14px',fontFamily:'inherit',fontSize:'12px',fontWeight:700,cursor:fetchState==='loading'?'default':'pointer',flexShrink:0,minWidth:'80px',transition:'background 0.18s'}}>
                  {fetchState==='loading'?'取得中…':'🔍 取得する'}
                </button>
              )}
              {fetchState==='applied'&&<span style={{color:'#7ed67f',fontSize:'12px',fontWeight:700}}>✓ 反映済み</span>}
            </div>

            {fetchState==='loading'&&(
              <div style={{marginTop:'10px',color:'rgba(255,255,255,0.6)',fontSize:'12px',display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{display:'inline-block',animation:'spin 1s linear infinite',fontSize:'14px'}}>⟳</span>
                SPAIA から試合情報を取得中...
              </div>
            )}

            {fetchState==='done'&&fetchGames.length>0&&(
              <div style={{marginTop:'12px'}}>
                {fetchVia&&<div style={{color:'rgba(255,255,255,0.35)',fontSize:'10px',marginBottom:'7px'}}>取得元: {fetchVia}</div>}
                <div style={{color:'rgba(255,255,255,0.55)',fontSize:'11px',marginBottom:'7px'}}>試合を選んでフォームに反映：</div>
                {fetchGames.map((g,i)=>{
                  const home=g.homeTeamName||'';
                  const away=g.visitorTeamName||'';
                  const hs=g.homeTeamTotalRuns;
                  const as=g.visitorTeamTotalRuns;
                  const hasScore=hs!=null&&as!=null&&g.gameStateId===4;
                  const isFinished=g.gameStateId===4;
                  const gameType=g.gameTypeName||'';
                  const startTime=g.startTime?g.startTime.slice(0,2)+':'+g.startTime.slice(2):'';
                  return(
                    <button key={g.gameId||i} onClick={()=>applyGame(g)}
                      style={{width:'100%',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'9px',padding:'10px 12px',marginBottom:'7px',cursor:'pointer',transition:'background 0.15s',textAlign:'left'}}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.14)'}
                      onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'}}>
                        <span style={{fontSize:'10px',color:'rgba(255,255,255,0.4)',letterSpacing:'0.5px'}}>{gameType}{startTime?` · ${startTime}`:''}</span>
                        <span style={{fontSize:'10px',color:isFinished?'rgba(255,255,255,0.4)':'#7ed67f'}}>{g.gameStateName||''}</span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                        <span style={{color:'white',fontWeight:700,fontSize:'13px',flex:1}}>{home}</span>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:'var(--gold)',letterSpacing:'2px',flexShrink:0}}>
                          {hasScore?`${hs} – ${as}`:'VS'}
                        </span>
                        <span style={{color:'white',fontWeight:700,fontSize:'13px',flex:1,textAlign:'right'}}>{away}</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}

            {fetchState==='applied'&&selectedGame&&(
              <div style={{marginTop:'10px'}}>
                <div style={{color:'#7ed67f',fontSize:'12px',fontWeight:700,marginBottom:'8px'}}>✓ フォームに反映済み</div>

                {detailLoading&&(
                  <div style={{color:'rgba(255,255,255,0.55)',fontSize:'12px',display:'flex',alignItems:'center',gap:'8px'}}>
                    <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span> 詳細データを取得中...
                  </div>
                )}

                {detailError&&<div style={{color:'#f08080',fontSize:'11px'}}>{detailError}</div>}

                {detail&&(()=>{
                  const ov=detail.overview;
                  // Starters
                  const homeStarters=detail.members.filter(m=>m.teamId===String(selectedGame.homeTeamId)&&m.startBatNo!=null).sort((a,b)=>a.startBatNo-b.startBatNo);
                  const awayStarters=detail.members.filter(m=>m.teamId===String(selectedGame.visitorTeamId)&&m.startBatNo!=null).sort((a,b)=>a.startBatNo-b.startBatNo);
                  // Pitchers sorted by no
                  const homePitchers=detail.pitchers.filter(p=>p.teamId===String(selectedGame.homeTeamId)).sort((a,b)=>a.no-b.no);
                  const awayPitchers=detail.pitchers.filter(p=>p.teamId===String(selectedGame.visitorTeamId)).sort((a,b)=>a.no-b.no);
                  // HRs
                  const parseHR=arr=>arr.flatMap(item=>{
                    try{const info=JSON.parse(item.homerunInfo||'[]');return info.map(h=>({...h,teamId:item.teamId}));}catch{return[];}
                  });
                  const hrs=parseHR(detail.homers);

                  return(
                    <div style={{marginTop:'4px'}}>
                      {/* Stadium & apply button */}
                      {ov&&(
                        <div style={{background:'rgba(255,255,255,0.07)',borderRadius:'8px',padding:'10px 12px',marginBottom:'8px'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
                            <span style={{color:'var(--gold)',fontSize:'12px',fontWeight:700}}>📍 {ov.stadiumName||'球場不明'} <span style={{color:'#7ed67f',fontSize:'10px'}}>✓ フォームに反映済み</span></span>
                          </div>
                          {ov.review&&<p style={{color:'rgba(255,255,255,0.6)',fontSize:'11px',lineHeight:1.7}}>{ov.review}</p>}
                        </div>
                      )}

                      {/* Pitchers */}
                      {(homePitchers.length>0||awayPitchers.length>0)&&(
                        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:'8px',padding:'10px 12px',marginBottom:'8px'}}>
                          <div style={{color:'rgba(255,255,255,0.5)',fontSize:'10px',letterSpacing:'1px',marginBottom:'8px'}}>投手成績</div>
                          {[{label:selectedGame.homeTeamName,pitchers:homePitchers},{label:selectedGame.visitorTeamName,pitchers:awayPitchers}].map(({label,pitchers})=>(
                            pitchers.length===0?null:
                            <div key={label} style={{marginBottom:'8px'}}>
                              <div style={{color:'rgba(255,255,255,0.45)',fontSize:'10px',marginBottom:'5px'}}>{label}</div>
                              {pitchers.map(p=>{
                                const fl=pitcherFlagLabel(p.winLoseSaveHoldFlag);
                                return(
                                  <div key={p.playerId} style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px',fontSize:'12px'}}>
                                    {fl
                                      ? <span style={{background:fl.bg,color:fl.color,borderRadius:'4px',padding:'1px 6px',fontWeight:700,fontSize:'11px',minWidth:'20px',textAlign:'center'}}>{fl.label}</span>
                                      : <span style={{minWidth:'20px'}}/>
                                    }
                                    <span style={{color:'white',fontWeight:500}}>{p.playerName.replace(/　/,' ')}</span>
                                    <span style={{color:'rgba(255,255,255,0.4)',fontSize:'11px'}}>#{p.number}</span>
                                    <span style={{color:'rgba(255,255,255,0.5)',fontSize:'11px',marginLeft:'auto'}}>{formatIP(p.ip,p.ip3)}回 {p.h}安{p.so}三 {p.r}失</span>
                                  </div>
                                );
                              })}
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Home Runs */}
                      {hrs.length>0&&(
                        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:'8px',padding:'10px 12px',marginBottom:'8px'}}>
                          <div style={{color:'rgba(255,255,255,0.5)',fontSize:'10px',letterSpacing:'1px',marginBottom:'6px'}}>本塁打</div>
                          {hrs.map((h,i)=>{
                            const tname=String(h.teamId)===String(selectedGame.homeTeamId)?selectedGame.homeTeamName:selectedGame.visitorTeamName;
                            return(
                              <div key={i} style={{color:'white',fontSize:'12px',marginBottom:'3px',display:'flex',gap:'8px',alignItems:'center'}}>
                                <span style={{fontSize:'16px'}}>💣</span>
                                <span style={{fontWeight:700}}>{h.name_s}</span>
                                <span style={{color:'rgba(255,255,255,0.4)',fontSize:'11px'}}>#{h.num} {tname}</span>
                                <span style={{color:'var(--gold)',fontSize:'11px',marginLeft:'auto'}}>{h.inn}回 {h.runs}打点</span>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* Starters */}
                      {(homeStarters.length>0||awayStarters.length>0)&&(
                        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:'8px',padding:'10px 12px'}}>
                          <div style={{color:'rgba(255,255,255,0.5)',fontSize:'10px',letterSpacing:'1px',marginBottom:'8px'}}>スタメン</div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
                            {[{label:selectedGame.homeTeamName,starters:homeStarters},{label:selectedGame.visitorTeamName,starters:awayStarters}].map(({label,starters})=>(
                              <div key={label}>
                                <div style={{color:'rgba(255,255,255,0.4)',fontSize:'10px',marginBottom:'5px'}}>{label}</div>
                                {starters.map(m=>{
                                  const isPitcher=String(m.startPosition)==='1';
                                  return(
                                    <div key={m.playerId} style={{display:'flex',gap:'5px',alignItems:'center',marginBottom:'2px',fontSize:'11px'}}>
                                      <span style={{color:'rgba(255,255,255,0.55)',minWidth:'14px',textAlign:'center',fontWeight:700}}>{isPitcher?'投':m.startPosition}</span>

                            ))}

                      )}

              </div>

            {(fetchState==='error'||fetchState==='cors')&&(
              <div style={{marginTop:'10px'}}>

        <div className="form-grid">
          <div className="form-group"><label className="form-label">ホームチーム *</label><select value={form.homeTeam} onChange={e=>set('homeTeam',e.target.value)}><option value="">選択してください</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="form-group"><label className="form-label">ビジターチーム *</label><select value={form.awayTeam} onChange={e=>set('awayTeam',e.target.value)}><option value="">選択してください</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="form-group"><label className="form-label">ホームスコア</label><input type="number" min="0" max="99" value={form.homeScore} onChange={e=>set('homeScore',e.target.value)} placeholder="0"/></div>
          <div className="form-group"><label className="form-label">ビジタースコア</label><input type="number" min="0" max="99" value={form.awayScore} onChange={e=>set('awayScore',e.target.value)} placeholder="0"/></div>
          <div className="form-group"><label className="form-label">天気</label><select value={form.weather} onChange={e=>set('weather',e.target.value)}><option value="">選択してください</option>{WEATHER.map(w=><option key={w}>{w}</option>)}</select></div>
          <div className="form-group"><label className="form-label">座席</label><input type="text" value={form.seat} onChange={e=>set('seat',e.target.value)} placeholder="例: 1塁側内野"/></div>
        </div>
        <div className="form-group"><label className="form-label">観戦メモ・感想</label><textarea rows="5" value={form.memo} onChange={e=>set('memo',e.target.value)} placeholder="今日の試合の印象的なシーン、雰囲気など..." style={{resize:'vertical'}}/></div>
      </>}
      {ftab==='food'&&<>
        <div className="section-title">球場グルメ記録</div>

        {/* 神宮球場限定メニューピッカー */}
        {form.stadium&&form.stadium.includes('神宮')&&(()=>{
          const curCat=JINGU_MENU.find(c=>c.cat===menuCat)||JINGU_MENU[0];
          return(
            <div style={{marginBottom:'14px',border:'1px solid var(--gold)',borderRadius:'10px',overflow:'hidden'}}>
              <button onClick={()=>setMenuOpen(o=>!o)}
                style={{width:'100%',background:'linear-gradient(135deg,#1B2A4A,#253A60)',border:'none',padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{color:'var(--gold)',fontWeight:700,fontSize:'13px'}}>⛩️ 神宮球場グルメメニューから選ぶ</span>
                <span style={{color:'var(--gold)',fontSize:'16px'}}>{menuOpen?'▲':'▼'}</span>
              </button>
              {menuOpen&&(
                <div style={{background:'var(--ivory)',padding:'10px 12px'}}>
                  {/* カテゴリータブ */}
                  <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'10px'}}>
                    {JINGU_MENU.map(c=>(
                      <button key={c.cat} onClick={()=>setMenuCat(c.cat)}
                        style={{background:menuCat===c.cat?'var(--navy)':'var(--ivory-dark)',color:menuCat===c.cat?'white':'var(--text)',border:'1px solid var(--border)',borderRadius:'20px',padding:'4px 10px',fontSize:'11px',cursor:'pointer',fontFamily:'inherit'}}>
                        {c.cat}
                      </button>
                    ))}
                  </div>
                  {/* メニュー一覧 */}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',maxHeight:'220px',overflowY:'auto'}}>
                    {curCat.items.map(item=>(
                      <button key={item.name} onClick={()=>{setFoodName(item.name);if(item.price)setFoodPrice(String(item.price));setMenuOpen(false);}}
                        style={{background:'white',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 10px',cursor:'pointer',textAlign:'left',fontFamily:'inherit',transition:'background 0.1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f0f4ff'}
                        onMouseLeave={e=>e.currentTarget.style.background='white'}>
                        <div style={{fontSize:'12px',fontWeight:600,color:'var(--navy)',lineHeight:1.4}}>{item.name}</div>
                        {item.price&&<div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>¥{item.price.toLocaleString()}</div>}
                      </button>
                    ))}
                  </div>
                  <p style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'8px'}}>※選択後、値段を確認・修正して「追加」を押してください</p>
                </div>
              )}
            </div>
          );
        })()}
        {foods.length===0&&<p style={{color:'var(--text-muted)',fontSize:'14px',textAlign:'center',padding:'16px 0'}}>まだグルメが登録されていません</p>}
        {foods.map(f=>(
          <div key={f.id} className="food-item">
            
            <div className="food-name">{f.name}</div>
            {f.price&&<div className="food-price">¥{parseInt(f.price).toLocaleString()}</div>}
            <button className="food-remove" onClick={()=>setFoods(fs=>fs.filter(x=>x.id!==f.id))}>×</button>
          </div>
        ))}
        {foods.length>0&&(()=>{const t=foods.reduce((s,f)=>s+(parseInt(f.price)||0),0);return t>0?<div className="food-total">合計 ¥{t.toLocaleString()}</div>:null;})()}
        <div className="food-add-row">
          <input type="text" value={foodName} onChange={e=>setFoodName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addFood()} placeholder="メニュー名"/>
          <input type="number" value={foodPrice} onChange={e=>setFoodPrice(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addFood()} placeholder="値段" style={{width:'100px',flex:'none'}}/>
          <button className="btn-primary" onClick={addFood} style={{flexShrink:0,padding:'10px 14px'}}>追加</button>
        </div>
      </>}
      {ftab==='photo'&&<>
        <div className="section-title">写真 · アルバム</div>
        {photos.length>0&&<div className="photo-grid" style={{marginBottom:'10px'}}>{photos.map(p=>(
          <div key={p.id} className="photo-thumb">
            <img src={p.src} alt={p.name}/>
            <button className="photo-del-btn" onClick={()=>setPhotos(ps=>ps.filter(x=>x.id!==p.id))}>×</button>
          </div>
        ))}</div>}
        <input type="file" accept="image/*" multiple ref={fileRef} style={{display:'none'}} onChange={handleFiles}/>
        <div className="upload-zone" onClick={()=>!photoLoading&&fileRef.current.click()} style={{opacity:photoLoading?0.6:1,cursor:photoLoading?'default':'pointer'}}>
          <div style={{fontSize:'30px',marginBottom:'7px'}}>{photoLoading?'⏳':'📷'}</div>
          <div style={{fontWeight:700,fontSize:'14px',marginBottom:'3px'}}>{photoLoading?'画像を処理中...':'写真を追加する'}</div>
          <div style={{fontSize:'12px',color:'var(--text-muted)'}}>{photoLoading?'しばらくお待ちください':'クリックしてファイルを選択（複数選択可）'}</div>
        </div>
      </>}
      <div className="btn-row">
        <button className="btn-secondary" onClick={onCancel}>キャンセル</button>
        <button className="btn-primary" onClick={save} disabled={photoLoading}>保存する ✓</button>
      </div>
    </div>
  );
}

/* ---- GameDetail ---- */
function GameDetail({game,myTeam,onBack,onEdit,onDelete}){
  const[lightbox,setLightbox]=useState(null);
  const h=parseInt(game.homeScore),a=parseInt(game.awayScore);
  const hasScore=game.homeScore!==''&&game.awayScore!=='';
  const homeWin=hasScore&&h>a,awayWin=hasScore&&a>h;
  const result=getResult(game,myTeam);
  const foodTotal=(game.foods||[]).reduce((s,f)=>s+(parseInt(f.price)||0),0);
  return(
    <div>
      <button className="back-btn" onClick={onBack}>← 一覧へ戻る</button>
      <div className="detail-hero">
        <div className="detail-meta">{formatDate(game.date)}{game.stadium&&` · 📍 ${game.stadium}`}{game.weather&&` · ${game.weather}`}</div>
        <div className="detail-matchup">
          <div className="detail-team"><div className="detail-team-label">HOME</div><div className={`detail-team-name${homeWin?' winner':''}`}>{game.homeTeam}</div></div>
          <div>{hasScore?<div className="detail-score">{game.homeScore}–{game.awayScore}</div>:<div style={{fontSize:'18px',color:'rgba(255,255,255,0.25)',textAlign:'center'}}>VS</div>}</div>
          <div className="detail-team" style={{textAlign:'right'}}><div className="detail-team-label">VISITOR</div><div className={`detail-team-name${awayWin?' winner':''}`}>{game.awayTeam}</div></div>
        </div>
        {game.seat&&<div className="detail-seat">🪑 {game.seat}</div>}
        {result&&<div className={`result-banner ${result==='WIN'?'win':result==='LOSE'?'lose':'draw'}`}>{result==='WIN'?'🎉 勝利！':result==='LOSE'?'😔 敗戦':'🤝 引き分け'}</div>}
      </div>
      {/* 試合総評（SPAIA） */}
      {game.spaiaDetail?.overview?.review&&(
        <div className="card">
          <div className="section-title">📝 試合総評</div>
          <p style={{fontSize:'14px',lineHeight:'1.9',color:'var(--text)'}}>{game.spaiaDetail.overview.review}</p>
        </div>
      )}

      {game.memo&&<div className="card"><div className="section-title">観戦メモ</div><p style={{fontSize:'15px',lineHeight:'1.9',whiteSpace:'pre-wrap'}}>{game.memo}</p></div>}

      {/* SPAIA 詳細データ */}
      {game.spaiaDetail&&(()=>{
        const sd=game.spaiaDetail;
        const lv=sd.live||null;
        const homeId=String(sd.overview?.homeTeamId||lv?.H_Score_ID||'');
        const awayId=String(sd.overview?.visitorTeamId||lv?.V_Score_ID||'');
        const homePitchers=(sd.pitchers||[]).filter(p=>String(p.teamId)===homeId).sort((a,b)=>a.no-b.no);
        const awayPitchers=(sd.pitchers||[]).filter(p=>String(p.teamId)===awayId).sort((a,b)=>a.no-b.no);
        const parseHR=arr=>(arr||[]).flatMap(item=>{try{const info=JSON.parse(item.homerunInfo||'[]');return info.map(h=>({...h,teamId:item.teamId}));}catch{return[];}});
        const hrs=parseHR(sd.homers||[]);

        const posLabel=pos=>{const p=String(pos);if(p==='1')return'投';if(p==='10')return'DH';return p;};

        // Starters and substitutes per team
        // starting_members_for_flash が真のスタメン情報。batters は打席成績に使う
        const buildLineup=(teamId)=>{
          // スタメン：starting_members_for_flash の startBatNo != null
          const memberStarters=(sd.members||[])
            .filter(m=>String(m.teamId)===teamId&&m.startBatNo!=null)
            .sort((a,b)=>a.startBatNo-b.startBatNo);
          const starterIds=new Set(memberStarters.map(m=>String(m.playerId)));

          // batters データから打席成績を引くマップ
          const batterMap={};
          (sd.batters||[]).filter(m=>String(m.teamId)===teamId).forEach(b=>{
            batterMap[String(b.playerId)]=b;
          });

          const result=[];
          memberStarters.forEach(s=>{
            const bat=batterMap[String(s.playerId)]||{};
            let brs=[];try{if(bat.battingResult)brs=JSON.parse(bat.battingResult);}catch{}
            result.push({
              ...s,...bat,
              isSub:false,
              plabel:posLabel(s.startPosition),
              battingResults:brs,
              playerName:s.playerName||bat.playerName,
            });
          });

          // 途中出場：batters にいて starters に含まれない出場選手
          (sd.batters||[])
            .filter(b=>String(b.teamId)===teamId&&b.originalTeamId!=null&&!starterIds.has(String(b.playerId)))
            .forEach(b=>{
              let brs=[];try{if(b.battingResult)brs=JSON.parse(b.battingResult);}catch{}
              // 同じ positionId のスタメンの直後に挿入
              const insertAfterIdx=result.findIndex(r=>!r.isSub&&String(r.startPosition)===String(b.positionId));
              const row={...b,isSub:true,plabel:posLabel(b.positionId),battingResults:brs};
              if(insertAfterIdx>=0){
                // そのスタメン以降の代打をすべて飛ばして最後の位置に挿入
                let ins=insertAfterIdx+1;
                while(ins<result.length&&result[ins].isSub&&String(result[ins].positionId)===String(b.positionId))ins++;
                result.splice(ins,0,row);
              }else{
                result.push(row);
              }
            });

          return result;
        };
        const homeLineup=buildLineup(homeId);
        const awayLineup=buildLineup(awayId);

        const hrLabel=runs=>{const r=Number(runs);if(r===1)return'ソロ';if(r===2)return'ツーラン';if(r===3)return'スリーラン';if(r>=4)return'満塁HR';return`${r}打点`;};

        const PRow=({p})=>{
          const fl=pitcherFlagLabel(p.winLoseSaveHoldFlag);
          const bbTotal=Number(p.bb||0)+Number(p.hbp||0);
          return(
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px',fontSize:'12px'}}>
              {fl
                ?<span style={{background:fl.bg,color:fl.color,borderRadius:'3px',padding:'0 5px',fontWeight:700,fontSize:'10px'}}>{fl.label}</span>
                :<span style={{display:'inline-block',width:'22px'}}/>
              }
              <span style={{fontWeight:500,flex:1}}>{(p.playerName||'').split(/[　 ]/)[0]}</span>
              <span style={{color:'var(--text-muted)',fontSize:'10px'}}>{formatIP(p.ip,p.ip3)}回 {p.h}安 {p.so}K{bbTotal>0?` ${bbTotal}四死`:''} {p.r}失</span>
            </div>
          );
        };

        const PlayerRow=({m})=>{
          const name=m.PlayerNameS||(m.playerName||'').split(/[　 ]/)[0]||'';
          const pos=m.plabel||posLabel(m.positionId||m.startPosition);
          const brColor=t=>t==='1'?'var(--green)':t==='2'?'#5e9cff':'var(--text-muted)';
          return(
            <div style={{marginBottom:'5px',paddingLeft:m.isSub?'10px':'0'}}>
              <div style={{display:'flex',gap:'5px',alignItems:'center',fontSize:'12px',
                color:m.isSub?'var(--text-muted)':'var(--text)'}}>
                <span style={{color:'var(--navy)',fontWeight:700,minWidth:'20px',textAlign:'center',fontSize:'11px'}}>{pos}</span>
                <span style={{flex:1}}>{name}</span>
                {m.isSub&&<span style={{fontSize:'10px',color:'var(--text-muted)'}}>(代)</span>}
                {m.h!=null&&<span style={{fontSize:'10px',color:'var(--text-muted)',marginLeft:'4px'}}>{m.ab}打数{m.h}安打{Number(m.rbi)>0?` ${m.rbi}打点`:''}</span>}
              </div>
              {(m.battingResults||[]).length>0&&(
                <div style={{display:'flex',gap:'3px',flexWrap:'wrap',marginTop:'2px',paddingLeft:'25px'}}>
                  {m.battingResults.map((br,i)=>(
                    <span key={i} style={{fontSize:'10px',color:brColor(String(br.battingResultType)),background:'var(--ivory)',borderRadius:'3px',padding:'0 4px'}}>{br.battingResult}</span>
                  ))}
                </div>
              )}
            </div>
          );
        };

        return(
          <>
            {/* live_games: 試合結果サマリー */}
            {lv&&(
              <div className="card">
                <div className="section-title">📊 試合結果</div>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',fontSize:'12px',borderCollapse:'collapse',minWidth:'300px'}}>
                    <thead>
                      <tr style={{borderBottom:'1px solid var(--ivory-dark)'}}>
                        <th style={{textAlign:'left',padding:'4px 6px',color:'var(--text-muted)',fontWeight:500}}>チーム</th>
                        {['R','H','BB','SB','E'].map(h=><th key={h} style={{padding:'4px 6px',color:'var(--text-muted)',fontWeight:500,textAlign:'center'}}>{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        {name:lv.H_Score_NameS,R:lv.H_Score_R,H:lv.H_Score_H,BB:lv.H_Score_BB,SB:lv.H_Score_SB,E:lv.H_Score_E},
                        {name:lv.V_Score_NameS,R:lv.V_Score_R,H:lv.V_Score_H,BB:lv.V_Score_BB,SB:lv.V_Score_SB,E:lv.V_Score_E},
                      ].map(row=>(
                        <tr key={row.name} style={{borderBottom:'1px solid var(--ivory-dark)'}}>
                          <td style={{padding:'6px',fontWeight:700}}>{row.name}</td>
                          <td style={{padding:'6px',textAlign:'center',fontWeight:700,color:'var(--navy)'}}>{row.R}</td>
                          <td style={{padding:'6px',textAlign:'center'}}>{row.H}</td>
                          <td style={{padding:'6px',textAlign:'center'}}>{row.BB}</td>
                          <td style={{padding:'6px',textAlign:'center'}}>{row.SB}</td>
                          <td style={{padding:'6px',textAlign:'center',color:row.E>0?'var(--crimson)':'inherit'}}>{row.E}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{marginTop:'12px',display:'flex',flexWrap:'wrap',gap:'8px 14px'}}>
                  {lv.End_WinPitcher_PlayerNameS&&(
                    <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                      <span style={{background:'#eaf5eb',color:'var(--green)',borderRadius:'4px',padding:'1px 7px',fontSize:'11px',fontWeight:700}}>勝</span>
                      <span style={{fontSize:'13px',fontWeight:700}}>{lv.End_WinPitcher_PlayerNameL||lv.End_WinPitcher_PlayerNameS}</span>
                      <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{lv.End_WinPitcher_Win}勝{lv.End_WinPitcher_Lose}敗</span>
                    </div>
                  )}
                  {lv.End_LosePitcher_PlayerNameS&&(
                    <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                      <span style={{background:'#fdf0ef',color:'var(--crimson)',borderRadius:'4px',padding:'1px 7px',fontSize:'11px',fontWeight:700}}>負</span>
                      <span style={{fontSize:'13px',fontWeight:700}}>{lv.End_LosePitcher_PlayerNameL||lv.End_LosePitcher_PlayerNameS}</span>
                      <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{lv.End_LosePitcher_Win}勝{lv.End_LosePitcher_Lose}敗</span>
                    </div>
                  )}
                  {lv.End_SavePitcher_PlayerNameS&&(
                    <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                      <span style={{background:'#e8f0fb',color:'#1B6CA8',borderRadius:'4px',padding:'1px 7px',fontSize:'11px',fontWeight:700}}>S</span>
                      <span style={{fontSize:'13px',fontWeight:700}}>{lv.End_SavePitcher_PlayerNameL||lv.End_SavePitcher_PlayerNameS}</span>
                      <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{lv.End_SavePitcher_Save}S</span>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* 投手成績 + 本塁打 横並び */}
            {(homePitchers.length>0||awayPitchers.length>0||hrs.length>0)&&(
              <div style={{display:'grid',gridTemplateColumns:hrs.length>0?'1fr 1fr':'1fr',gap:'12px',marginBottom:'14px'}}>
                {(homePitchers.length>0||awayPitchers.length>0)&&(
                  <div className="card" style={{marginBottom:0}}>
                    <div className="section-title">⚾ 投手成績</div>
                    {homePitchers.length>0&&<><div style={{fontSize:'10px',color:'var(--text-muted)',fontWeight:700,marginBottom:'5px'}}>{game.homeTeam}</div>{homePitchers.map(p=><PRow key={p.playerId} p={p}/>)}</>}
                    {awayPitchers.length>0&&<><div style={{fontSize:'10px',color:'var(--text-muted)',fontWeight:700,margin:'8px 0 5px'}}>{game.awayTeam}</div>{awayPitchers.map(p=><PRow key={p.playerId} p={p}/>)}</>}
                  </div>
                )}
                {hrs.length>0&&(
                  <div className="card" style={{marginBottom:0}}>
                    <div className="section-title">💣 本塁打</div>
                    {hrs.map((h,i)=>{
                      const tname=String(h.teamId)===homeId?game.homeTeam:game.awayTeam;
                      return(<div key={i} style={{marginBottom:'6px',fontSize:'12px'}}><div style={{fontWeight:700}}>{h.name_s} <span style={{color:'var(--crimson)'}}>{hrLabel(h.runs)}</span></div><div style={{color:'var(--text-muted)',fontSize:'11px'}}>{h.inn}回 {tname}</div></div>);
                    })}
                  </div>
                )}
              </div>
            )}

            {/* 出場選手 */}
            {(homeLineup.length>0||awayLineup.length>0)&&(
              <div className="card">
                <div className="section-title">📋 出場選手</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
                  {[{label:game.homeTeam,lineup:homeLineup},{label:game.awayTeam,lineup:awayLineup}].map(({label,lineup})=>(
                    <div key={label}>
                      <div style={{fontSize:'11px',color:'var(--text-muted)',fontWeight:700,marginBottom:'7px'}}>{label}</div>
                      {lineup.map((m,i)=>{
                        // 打順区切り線：スタメン行の前（最初を除く）
                        const showDivider=!m.isSub&&i>0;
                        return(
                          <React.Fragment key={m.playerId+i}>
                            {showDivider&&<div style={{borderTop:'1px solid var(--ivory-dark)',margin:'4px 0'}}/>}
                            <PlayerRow m={m}/>
                          </React.Fragment>
                        );
                      })}
                    </div>
                  ))}
                </div>
                <p style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'10px'}}>※（代）は途中出場。守備位置はスタメン時の番号</p>
              </div>
            )}
          </>
        );
      })()}
      {(game.foods||[]).length>0&&(
        <div className="card">
          <div className="section-title">球場グルメ ({game.foods.length}品)</div>
          {game.foods.map(f=><div key={f.id} className="food-item"><div className="food-name">{f.name}</div>{f.price&&<div className="food-price">¥{parseInt(f.price).toLocaleString()}</div>}</div>)}
          {foodTotal>0&&<div className="food-total">合計 ¥{foodTotal.toLocaleString()}</div>}
        </div>
      )}
      {(game.photos||[]).length>0&&(
        <div className="card">
          <div className="section-title">フォトアルバム ({game.photos.length}枚)</div>
          <div className="photo-grid">{game.photos.map(p=><div key={p.id} className="photo-thumb" onClick={()=>setLightbox(p.src)}><img src={p.src} alt={p.name}/></div>)}</div>
        </div>
      )}
      <div className="btn-row">
        <button className="btn-danger" onClick={()=>onDelete(game.id)}>削除する</button>
        <button className="btn-primary" onClick={()=>onEdit(game)}>編集する</button>
      </div>
      {lightbox&&<div className="lightbox" onClick={()=>setLightbox(null)}><button className="lightbox-close" onClick={()=>setLightbox(null)}>×</button><img src={lightbox} onClick={e=>e.stopPropagation()} alt="photo"/></div>}

function StatsView({games,myTeam}){

  const totalGames=games.length,totalPhotos=games.reduce((s,g)=>s+(g.photos||[]).length,0);
  const totalFood=games.reduce((s,g)=>s+(g.foods||[]).reduce((ss,f)=>ss+(parseInt(f.price)||0),0),0);
  const stadiumSet=new Set(games.map(g=>g.stadium).filter(Boolean));
  const teamCount={};games.forEach(g=>{if(g.homeTeam)teamCount[g.homeTeam]=(teamCount[g.homeTeam]||0)+1;if(g.awayTeam)teamCount[g.awayTeam]=(teamCount[g.awayTeam]||0)+1;});
  const topTeams=Object.entries(teamCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const stadiumCount={};games.forEach(g=>{if(g.stadium)stadiumCount[g.stadium]=(stadiumCount[g.stadium]||0)+1;});
  const topStadiums=Object.entries(stadiumCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const rankClass=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'other';
  let wins=0,losses=0,draws=0;
  if(myTeam){games.forEach(g=>{const r=getResult(g,myTeam);if(r==='WIN')wins++;else if(r==='LOSE')losses++;else if(r==='DRAW')draws++;});}
  const decided=wins+losses+draws;
  const pct=decided>0?Math.round((wins/decided)*1000)/10:null;
  return(
    <div>
      <div className="stats-grid">
        {[{num:totalGames,label:'観戦試合数'},{num:stadiumSet.size,label:'訪問球場数'},{num:totalPhotos,label:'写真枚数'},{num:`¥${totalFood.toLocaleString()}`,label:'グルメ総額'}].map((s,i)=>(
          <div key={i} className="stat-card"><div className="stat-big">{s.num}</div><div className="stat-label">{s.label}</div></div>
        ))}
      </div>
      {myTeam&&(()=>{
          const mascot=TEAM_MASCOT[myTeam];
          return(
            <div className="card" style={{position:'relative',overflow:'hidden'}}>
              {mascot&&(
                <div style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',fontSize:'72px',opacity:0.10,pointerEvents:'none',lineHeight:1}}>
                  {mascot.emoji}
                </div>
              )}
              <div className="section-title">⭐ {myTeam} 観戦成績</div>
              <div className="wl-row">
                <div className="wl-box w"><div className="wl-num">{wins}</div><div className="wl-lbl">WIN</div></div>
                <div className="wl-box l"><div className="wl-num">{losses}</div><div className="wl-lbl">LOSE</div></div>
                <div className="wl-box d"><div className="wl-num">{draws}</div><div className="wl-lbl">DRAW</div></div>
              </div>
              {pct!==null&&<p style={{textAlign:'center',fontSize:'13px',color:'var(--text-muted)'}}>勝率 {pct}%（スコア入力済み {decided}試合）</p>}
              {decided===0&&<p style={{textAlign:'center',fontSize:'13px',color:'var(--text-muted)'}}>スコアを記録すると勝敗が集計されます</p>}
              {mascot&&<p style={{textAlign:'center',fontSize:'11px',color:'var(--text-muted)',marginTop:'4px'}}>{mascot.emoji} {mascot.name}と一緒に応援中！</p>}
            </div>
          );
        })()}
      {topTeams.length>0&&<div className="card"><div className="section-title">よく見たチーム TOP5</div>{topTeams.map(([team,count],i)=>(
        <div key={team} className="rank-row"><div className={`rank-badge ${rankClass(i)}`}>{i+1}</div><div className="rank-name">{team}{team===myTeam?' ⭐':''}</div><div className="rank-bar-wrap"><div className="rank-bar-bg"><div className="rank-bar-fill" style={{width:`${(count/topTeams[0][1])*100}%`}}/></div><div className="rank-count">{count}試合</div></div></div>
      ))}</div>}
      {topStadiums.length>0&&<div className="card"><div className="section-title">よく行った球場 TOP5</div>{topStadiums.map(([stadium,count],i)=>(
        <div key={stadium} className="rank-row"><div className={`rank-badge ${rankClass(i)}`}>{i+1}</div><div className="rank-name">{stadium}</div><div className="rank-bar-wrap"><div className="rank-bar-bg"><div className="rank-bar-fill" style={{width:`${(count/topStadiums[0][1])*100}%`}}/></div><div className="rank-count">{count}回</div></div></div>

/* ---- WeatherView ---- */
function WeatherView(){
  const[data,setData]=useState({});
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    Promise.all(Object.entries(STADIUM_COORDS).map(([name,c])=>
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lng}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia%2FTokyo&forecast_days=5`)
        .then(r=>r.json()).then(d=>({name,d})).catch(()=>({name,d:null}))
    )).then(results=>{const map={};results.forEach(({name,d})=>{map[name]=d;});setData(map);setLoading(false);});
  },[]);
  const dayLabels=['今日','明日','明後日','3日後','4日後'];
  if(loading)return<div style={{textAlign:'center',padding:'60px 20px'}}><div style={{fontSize:'34px',marginBottom:'12px'}}>🌤️</div><div style={{fontSize:'14px',color:'var(--text-muted)'}}>全球場の天気予報を取得中...</div></div>;
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'14px',alignItems:'center'}}>
        <p style={{fontSize:'12px',color:'var(--text-muted)'}}>Open-Meteo による5日間予報</p>
        <p style={{fontSize:'11px',color:'var(--text-muted)'}}>{new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric'})} 時点</p>
      </div>
      <div className="weather-grid">
        {Object.entries(STADIUM_COORDS).map(([name,coords])=>{
          const d=data[name];
          if(!d?.daily)return<div key={name} className="weather-card"><div className="weather-stadium">📍 {name}</div><p style={{fontSize:'12px',color:'var(--text-muted)',padding:'10px 0'}}>取得中...</p></div>;
          const{weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum}=d.daily;
          return(
            <div key={name} className="weather-card">
              <div className="weather-stadium">📍 {name} <span style={{fontWeight:400,color:'var(--text-muted)',fontSize:'10px'}}>({coords.city})</span></div>
              <div className="weather-days">
                {weathercode.map((code,i)=>(
                  <div key={i} className="weather-day">
                    <div className="weather-day-label">{dayLabels[i]}</div>
                    <div className="weather-day-icon">{wmoIcon(code)}</div>
                    <div className="weather-day-hi">{Math.round(temperature_2m_max[i])}°</div>
                    <div className="weather-day-lo">{Math.round(temperature_2m_min[i])}°</div>
                    {precipitation_sum[i]>0&&<div className="weather-day-rain">💧{precipitation_sum[i].toFixed(1)}</div>}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
