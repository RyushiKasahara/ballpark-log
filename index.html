  const importRef=useRef();

  const handleImgUpload=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{setCustomImg(ev.target.result);setSelBg('custom');};
    r.readAsDataURL(file);
    e.target.value='';
  };
  const handleSave=()=>{
    onSaveFav(selTeam);
    const newPref={id:selBg,opacity,img:selBg==='custom'?customImg:null};
    onSaveBg(newPref);
    onClose();
  };

  /* --- EXPORT --- */
  const handleExport=()=>{
    const payload={
      version:1,
      exportedAt:new Date().toISOString(),
      games
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date();
    const stamp=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    a.href=url;
    a.download=`ballpark_log_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  /* --- IMPORT --- */
  const handleImportFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const json=JSON.parse(ev.target.result);
        if(!json.games||!Array.isArray(json.games)) throw new Error('games フィールドが見つかりません');
        const count=json.games.length;
        if(!confirm(`${count}件の観戦記録をインポートします。\n既存のデータに追加されます（重複は自動でスキップ）。\n続けますか？`)){
          e.target.value='';return;
        }
        onImport(json.games);
        setImportResult({type:'success',msg:`✓ ${count}件をインポートしました`});
      }catch(err){
        setImportResult({type:'error',msg:'⚠️ 読み込みに失敗しました：'+err.message});
      }
    };
    r.readAsText(file);
    e.target.value='';
  };

  /* --- RESET --- */
  const handleReset=()=>{
    if(!confirm('全ての観戦記録を削除します。この操作は元に戻せません。\n本当によろしいですか？'))return;
    if(!confirm('最終確認：本当に全データを削除しますか？'))return;
    onImport([]);
    setImportResult({type:'success',msg:'✓ 全データを削除しました'});
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-title">設定</div>
        <p style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'4px'}}>お気に入りチームを選ぶと勝敗が記録・集計されます。</p>
        <div className="fav-team-grid">
          {TEAMS.map(t=><button key={t} className={`fav-team-btn${selTeam===t?' selected':''}`} onClick={()=>setSelTeam(t)}>{selTeam===t?'⭐ ':''}{t}</button>)}
        </div>
        {selTeam&&<button className="btn-secondary" style={{width:'100%',marginBottom:'10px',fontSize:'13px',padding:'9px 0'}} onClick={()=>setSelTeam('')}>チーム設定を解除する</button>}

        <div className="bg-section">
          <div style={{fontSize:'11px',fontWeight:700,color:'var(--navy)',letterSpacing:'2px',textTransform:'uppercase',paddingBottom:'10px',borderBottom:'2px solid var(--gold)',marginBottom:'13px'}}>背景テーマ</div>
          <div className="bg-presets">
            {BG_PRESETS.map(p=>(
              <div key={p.id} onClick={()=>{setSelBg(p.id);const def=BG_PRESETS.find(x=>x.id===p.id);if(def)setOpacity(def.overlay||0);}}>
                <div className={`bg-preset${selBg===p.id?' selected':''}`}>
                  <div className="bg-swatch" style={p.style}>{p.icon}</div>
                </div>
                <div className="bg-preset-label">{p.label}</div>
              </div>
            ))}
          </div>
          {selBg==='custom'&&(
            <>
              <input type="file" accept="image/*" ref={imgRef} style={{display:'none'}} onChange={handleImgUpload}/>
              <div className="bg-upload-zone" onClick={()=>imgRef.current.click()}>
                <div style={{fontSize:'26px',marginBottom:'5px'}}>🖼️</div>
                <div style={{fontWeight:700,fontSize:'13px'}}>画像ファイルを選択</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>JPG / PNG / WEBP</div>
              </div>
              {customImg&&<img src={customImg} className="bg-current-preview" alt="preview"/>}
            </>
          )}
          {selBg!=='default'&&(
            <div className="overlay-row">
              <span className="overlay-label">背景の明るさ <span style={{fontWeight:700,color:'var(--navy)'}}>{Math.round(opacity*100)}%</span></span>
              <input type="range" min="0" max="100" step="1" value={Math.round(opacity*100)} onChange={e=>setOpacity(parseInt(e.target.value)/100)} style={{flex:1}}/>
            </div>
          )}
        </div>

        {/* DATA SECTION */}
        <div className="data-section">
          <div style={{fontSize:'11px',fontWeight:700,color:'var(--navy)',letterSpacing:'2px',textTransform:'uppercase',paddingBottom:'10px',borderBottom:'2px solid var(--gold)',marginBottom:'4px'}}>データ管理</div>
          <p style={{fontSize:'12px',color:'var(--text-muted)',margin:'8px 0 0',lineHeight:1.7}}>
            観戦記録を JSON ファイルとしてバックアップ・復元できます。<br/>機種変更や友達への引き継ぎに使えます。
          </p>
          <div className="data-btn-row">
            <button className="data-btn" onClick={handleExport}>
              <span className="data-btn-icon">📤</span>
              <span className="data-btn-label">エクスポート</span>
              <span className="data-btn-desc">{games.length}件をJSONで<br/>ダウンロード</span>
            </button>
            <button className="data-btn" onClick={()=>importRef.current.click()}>
              <span className="data-btn-icon">📥</span>
              <span className="data-btn-label">インポート</span>
              <span className="data-btn-desc">JSONファイルから<br/>記録を読み込む</span>
            </button>
          </div>
          <input type="file" accept=".json,application/json" ref={importRef} style={{display:'none'}} onChange={handleImportFile}/>
          {importResult&&(
            <div className={`import-result ${importResult.type}`}>{importResult.msg}</div>
          )}
          <div style={{marginTop:'10px'}}>
            <button className="data-btn danger" style={{width:'100%',flexDirection:'row',gap:'10px',padding:'11px 14px',justifyContent:'flex-start'}} onClick={handleReset}>
              <span className="data-btn-icon" style={{fontSize:'18px'}}>🗑️</span>
              <div style={{textAlign:'left'}}>
                <div className="data-btn-label">全データを削除</div>
                <div className="data-btn-desc">記録をリセットします（取り消し不可）</div>
              </div>
            </button>
          </div>
        </div>

        <div className="btn-row" style={{marginTop:'20px'}}>
          <button className="btn-secondary" onClick={onClose}>キャンセル</button>
          <button className="btn-primary" onClick={handleSave}>保存する</button>
        </div>
      </div>
    </div>
  );
}

/* ---- App ---- */
function App(){
  const[games,setGames]=useState(loadGames);
  const[view,setView]=useState('list');
  const[tab,setTab]=useState('list');
  const[selected,setSelected]=useState(null);
  const[editGame,setEditGame]=useState(null);
  const[myTeam,setMyTeam]=useState(loadFavTeam);
  const[bgPref,setBgPref]=useState(loadBgPref);
  const[showSettings,setShowSettings]=useState(false);
  const[query,setQuery]=useState('');

  useEffect(()=>{saveGames(games);},[games]);
  useEffect(()=>{applyBg(bgPref);},[bgPref]);

  const handleSave=game=>{
    setGames(gs=>{const idx=gs.findIndex(g=>g.id===game.id);if(idx>=0){const u=[...gs];u[idx]=game;return u;}return[game,...gs];});
    setSelected(game);setView('detail');setEditGame(null);
  };
  const handleDelete=id=>{
    if(!confirm('この観戦記録を削除しますか？'))return;
    setGames(gs=>gs.filter(g=>g.id!==id));setSelected(null);setView('list');setTab('list');
  };
  const handleEdit=game=>{setEditGame(game);setView('add');};
  const handleCardClick=game=>{setSelected(game);setView('detail');};
  const switchTab=t=>{setTab(t);setView(t);setSelected(null);setEditGame(null);setQuery('');};
  const saveFav=t=>{setMyTeam(t);saveFavTeam(t);};
  const saveBg=p=>{setBgPref(p);saveBgPref(p);};
  const handleImport=incoming=>{
    if(incoming.length===0){setGames([]);return;}
    setGames(current=>{
      const existingIds=new Set(current.map(g=>g.id));
      const newOnes=incoming.filter(g=>!existingIds.has(g.id));
      return [...current,...newOnes].sort((a,b)=>new Date(b.date)-new Date(a.date));
    });
  };

  const sorted=useMemo(()=>[...games].sort((a,b)=>new Date(b.date)-new Date(a.date)),[games]);
  const filtered=useMemo(()=>sorted.filter(g=>gameMatchesQuery(g,query)),[sorted,query]);

  return(
    <>
      {/* HEADER */}
      <header className="header">
        <div className="header-inner">
          <div className="logo">
            <div className="logo-ball">⚾</div>
            <div><div className="logo-text">BALLPARK LOG</div><div className="logo-sub">野球観戦記録</div></div>
          </div>
          <nav className="header-nav">
            <button className={`nav-tab${tab==='list'?' active':''}`} onClick={()=>switchTab('list')}>観戦記録</button>
            <button className={`nav-tab${tab==='stats'?' active':''}`} onClick={()=>switchTab('stats')}>統計</button>
            <button className={`nav-tab${tab==='allfood'?' active':''}`} onClick={()=>switchTab('allfood')}>🍱 グルメ帳</button>
            <button className={`nav-tab${tab==='allphoto'?' active':''}`} onClick={()=>switchTab('allphoto')}>📷 アルバム</button>
            <button className={`nav-tab${tab==='weather'?' active':''}`} onClick={()=>switchTab('weather')}>⛅ 天気</button>
            <button className={`nav-tab${tab==='sportsnavi'?' active':''}`} onClick={()=>switchTab('sportsnavi')}>📰 SportsNavi</button>
            <button className={`nav-tab${tab==='swallows'?' active':''}`} onClick={()=>switchTab('swallows')} style={{color:tab==='swallows'?'var(--navy)':'rgba(255,255,255,0.55)'}}>🐦 スワローズ</button>
          </nav>
          <button className="icon-btn" onClick={()=>setShowSettings(true)} title="設定">{myTeam?'⭐':'⚙️'}</button>
        </div>
      </header>

      {/* MAIN */}
      <main className="main">
        {view==='list'&&(
          <>
            {/* Search bar */}
            <div className="search-wrap">
              <span className="search-icon">🔍</span>
              <input className="search-input" type="search" value={query} onChange={e=>setQuery(e.target.value)} placeholder="チーム・球場・メモを検索..."/>
              {query&&<button className="search-clear" onClick={()=>setQuery('')}>×</button>}
            </div>
            {query&&<div className="search-meta"><strong>{filtered.length}</strong> 件ヒット（全{sorted.length}件）</div>}
            {filtered.length===0&&query?(
              <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">「{query}」に一致する記録はありません</div><div className="empty-desc">別のキーワードで試してみてください</div></div>
            ):filtered.length===0?(
              <div className="empty-state"><div className="empty-icon">⚾</div><div className="empty-title">観戦記録をはじめましょう</div><div className="empty-desc">右下の ＋ ボタンから最初の試合を記録できます</div></div>
            ):(
              filtered.map(g=><GameCard key={g.id} game={g} myTeam={myTeam} onClick={handleCardClick} query={query}/>)
            )}
            <button className="fab" onClick={()=>{setEditGame(null);setView('add');}}>＋</button>
          </>
        )}
        {view==='add'&&<AddForm initial={editGame} onSave={handleSave} onCancel={()=>{selected?setView('detail'):setView('list');}}/>}
        {view==='detail'&&selected&&(
          <GameDetail game={games.find(g=>g.id===selected.id)||selected} myTeam={myTeam} onBack={()=>{setSelected(null);setView('list');setTab('list');}} onEdit={handleEdit} onDelete={handleDelete}/>
        )}
        {view==='stats'&&<StatsView games={games} myTeam={myTeam}/>}
        {view==='allfood'&&<AllFoodView games={games}/>}
        {view==='allphoto'&&<AllPhotoView games={games}/>}
        {view==='weather'&&<WeatherView/>}
        {view==='sportsnavi'&&<SportsNaviView/>}
        {view==='swallows'&&<SwallowsView/>}
      </main>

      {/* BOTTOM NAV (mobile) */}
      <nav className="bottom-nav">
        <div className="bottom-nav-inner">
          <button className={`bnav-tab${tab==='list'?' active':''}`} onClick={()=>switchTab('list')}>
            <span className="bnav-icon">📋</span>記録
          </button>
          <button className={`bnav-tab${tab==='stats'?' active':''}`} onClick={()=>switchTab('stats')}>
            <span className="bnav-icon">📊</span>統計
          </button>
          <button className="bnav-tab bnav-add" onClick={()=>{setEditGame(null);setView('add');setTab('add');}}>
            <span className="bnav-icon-circle">＋</span>
          </button>
          <button className={`bnav-tab${tab==='allfood'?' active':''}`} onClick={()=>switchTab('allfood')}>
            <span className="bnav-icon">🍱</span>グルメ
          </button>
          <button className={`bnav-tab${tab==='allphoto'?' active':''}`} onClick={()=>switchTab('allphoto')}>
            <span className="bnav-icon">📷</span>アルバム
          </button>
          <button className={`bnav-tab${tab==='weather'?' active':''}`} onClick={()=>switchTab('weather')}>
            <span className="bnav-icon">⛅</span>天気
          </button>
          <button className={`bnav-tab${tab==='sportsnavi'?' active':''}`} onClick={()=>switchTab('sportsnavi')}>
            <span className="bnav-icon">📰</span>S-Navi
          </button>
          <button className={`bnav-tab${tab==='swallows'?' active':''}`} onClick={()=>switchTab('swallows')}>
            <span className="bnav-icon">🐦</span>燕
          </button>
          <button className="bnav-tab" onClick={()=>setShowSettings(true)}>
            <span className="bnav-icon">{myTeam?'⭐':'⚙️'}</span>設定
          </button>
        </div>
      </nav>

      {showSettings&&<SettingsModal favTeam={myTeam} bgPref={bgPref} games={games} onSaveFav={saveFav} onSaveBg={saveBg} onImport={handleImport} onClose={()=>setShowSettings(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
